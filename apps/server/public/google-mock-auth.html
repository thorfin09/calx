<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f4f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .auth-box {
      background-color: #ffffff;
      border-radius: 28px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }
    .google-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .google-logo svg {
      width: 48px;
      height: 48px;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #1f1f1f;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 16px;
      color: #444746;
      margin: 0 0 28px 0;
    }
    .account-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #c4c7c5;
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.15s, border-color 0.15s;
    }
    .account-option:hover {
      background-color: #f7f9fc;
      border-color: #a8aaa9;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #0b57d0;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }
    .info {
      display: flex;
      flex-direction: column;
    }
    .name {
      font-size: 14px;
      font-weight: 500;
      color: #1f1f1f;
    }
    .email {
      font-size: 12px;
      color: #444746;
    }
    .custom-input-box {
      border-top: 1px solid #e3e3e3;
      padding-top: 16px;
      margin-top: 16px;
    }
    .custom-input-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #c4c7c5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .custom-input-box input:focus {
      border-color: #0b57d0;
    }
    .btn-submit {
      width: 100%;
      background-color: #0b57d0;
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .btn-submit:hover {
      background-color: #0842a0;
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <div class="google-logo">
      <svg viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.48 14.97 1 12 1 7.35 1 3.39 3.65 1.5 7.5l3.86 3C6.27 7.74 8.89 5.04 12 5.04z"/>
        <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.28 1.48-1.12 2.73-2.38 3.58l3.7 2.87c2.16-2 3.71-4.94 3.71-8.6z"/>
        <path fill="#FBBC05" d="M5.36 14.5c-.24-.72-.38-1.49-.38-2.3s.14-1.58.38-2.3L1.5 6.9C.54 8.82 0 10.96 0 13.2s.54 4.38 1.5 6.3l3.86-3z"/>
        <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.7-2.87c-1.03.69-2.34 1.1-4.26 1.1-3.11 0-5.73-2.7-6.64-5.46L1.5 15.82C3.39 19.65 7.35 23 12 23z"/>
      </svg>
    </div>
    <h1>Choose an account</h1>
    <p>to continue to Calx Math</p>

    <!-- Simulated account selections -->
    <div class="account-option" onclick="choose('John Doe', 'john.doe@gmail.com')">
      <div class="avatar" style="background-color: #b06000;">J</div>
      <div class="info">
        <span class="name">John Doe</span>
        <span class="email">john.doe@gmail.com</span>
      </div>
    </div>

    <div class="account-option" onclick="choose('Calx Prodigy', 'calx.prodigy@gmail.com')">
      <div class="avatar" style="background-color: #0b57d0;">C</div>
      <div class="info">
        <span class="name">Calx Prodigy</span>
        <span class="email">calx.prodigy@gmail.com</span>
      </div>
    </div>

    <!-- Custom email input choice -->
    <div class="custom-input-box">
      <input type="text" id="custom-name" placeholder="Full Name (e.g. Alice Smith)" />
      <input type="email" id="custom-email" placeholder="Gmail Address (e.g. alice@gmail.com)" />
      <button class="btn-submit" onclick="submitCustom()">Use another account</button>
    </div>
  </div>

  <script>
    function choose(name, email) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'GOOGLE_AUTH_SUCCESS',
          user: { name, email }
        }, '*');
        window.close();
      }
    }

    function submitCustom() {
      const name = document.getElementById('custom-name').value.trim();
      const email = document.getElementById('custom-email').value.trim();
      
      if (!name || !email) {
        alert("Please enter both name and email.");
        return;
      }
      if (!email.includes('@')) {
        alert("Please enter a valid email address.");
        return;
      }
      
      choose(name, email);
    }
  </script>
</body>
</html>
